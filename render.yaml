services:
  - type: web
    name: neptunys-form
    runtime: docker
    plan: free
    region: oregon
    rootDir: vendor/heyform-upstream
    dockerfilePath: vendor/heyform-upstream/Dockerfile
    dockerContext: vendor/heyform-upstream
    autoDeployTrigger: commit
    healthCheckPath: /health/ready
    buildFilter:
      paths:
        - vendor/heyform-upstream/**
        - render.yaml
        - DEPLOY_RENDER.md
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_LISTEN_PORT
        value: "10000"
      - key: ENABLE_GOOGLE_FONTS
        value: "false"
      - key: VERIFY_USER_EMAIL
        value: "true"
      - key: MAIL_PROVIDER
        value: gmail
      - key: ADMIN_APPROVAL_EMAIL
        value: contact@neptunys.com
      - key: BULL_JOB_TIMEOUT
        value: 5m
      - key: SESSION_KEY
        generateValue: true
      - key: FORM_ENCRYPTION_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_FROM
        value: NeptunysForm <noreply@neptunys.com>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_SERVERNAME
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_IGNORE_CERT
        sync: false
      - key: GMAIL_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GMAIL_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GMAIL_IMPERSONATED_USER
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_GPT_MODEL
        value: gpt-4.1-mini