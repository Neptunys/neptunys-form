services:
  neptunysform:
    environment:
      SMTP_FROM: ${SMTP_FROM:-NeptunysForm Local <noreply@local.test>}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_SERVERNAME: ""
      SMTP_IGNORE_CERT: false
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025'
      - '1025:1025'